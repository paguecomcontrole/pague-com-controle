<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pague com Controle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f3f4f6; }
        .sidebar {
            width: 260px;
            background-color: #1e3a8a;
            color: #fff;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area img { width: 140px; border-radius: 8px; }
        .menu { flex: 1; }
        .menu a {
            display: block;
            color: #dbeafe;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .menu a:hover, .menu a.active { background-color: #2563eb; color: #fff; }
        .btn-sair {
            background-color: #dc2626;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-sair:hover { background-color: #b91c1c; }
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 24px; color: #111827; }
        .btn-nova {
            background-color: #16a34a;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-nova:hover { background-color: #15803d; }
        .cards { display: flex; gap: 20px; margin-bottom: 24px; }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex: 1;
        }
        .card h3 { font-size: 14px; color: #6b7280; margin-bottom: 8px; }
        .card p { font-size: 24px; font-weight: bold; color: #111827; }
        .table-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { color: #6b7280; font-size: 13px; text-transform: uppercase; }
        .acoes button {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 6px;
        }
        .btn-editar { background-color: #f59e0b; color: #fff; }
        .btn-excluir { background-color: #dc2626; color: #fff; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            padding: 28px;
            border-radius: 12px;
            width: 100%;
            max-width: 460px;
        }
        .modal-content h2 { margin-bottom: 20px; color: #111827; }
        .campo { margin-bottom: 14px; }
        .campo label { display: block; margin-bottom: 6px; color: #374151; font-size: 14px; }
        .campo input, .campo select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
        }
        .modal-botoes { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancelar { background-color: #9ca3af; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
        .btn-salvar { background-color: #2563eb; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
        .empty { text-align: center; color: #6b7280; padding: 30px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="Logo Pague com Controle">
        </div>
        <nav class="menu">
            <a href="#" class="active"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#"><i class="fas fa-chart-bar"></i> Relatórios</a>
            <a href="#"><i class="fas fa-cog"></i> Configurações</a>
        </nav>
        <button class="btn-sair" onclick="sairDoSistema()"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </aside>

    <main class="main">
        <div class="header">
            <h1>Minhas Contas</h1>
            <button class="btn-nova" onclick="abrirModal()"><i class="fas fa-plus"></i> Nova Conta</button>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Total em Contas</h3>
                <p id="totalContas">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Quantidade</h3>
                <p id="qtdContas">0</p>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Vencimento</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaContas">
                    <tr><td colspan="6" class="empty">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal" id="modalConta">
        <div class="modal-content">
            <h2 id="modalTitulo">Nova Conta</h2>
            <input type="hidden" id="contaId">
            <div class="campo">
                <label>Descrição</label>
                <input type="text" id="descricao" placeholder="Ex: Conta de luz">
            </div>
            <div class="campo">
                <label>Categoria</label>
                <select id="categoria">
                    <option value="Moradia">Moradia</option>
                    <option value="Alimentação">Alimentação</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Lazer">Lazer</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>
            <div class="campo">
                <label>Vencimento</label>
                <input type="date" id="vencimento">
            </div>
            <div class="campo">
                <label>Valor</label>
                <input type="number" id="valor" step="0.01" placeholder="0,00">
            </div>
            <div class="campo">
                <label>Status</label>
                <select id="status">
                    <option value="Pendente">Pendente</option>
                    <option value="Pago">Pago</option>
                    <option value="Atrasado">Atrasado</option>
                </select>
            </div>
            <div class="modal-botoes">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarConta()">Salvar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB7JQAelkgWif5AttFqtiCJAfgxxsDuYZQ",
            authDomain: "pague-com-controle.firebaseapp.com",
            projectId: "pague-com-controle",
            storageBucket: "pague-com-controle.firebasestorage.app",
            messagingSenderId: "829210830790",
            appId: "1:829210830790:web:b7a4822b4886471d4cb4c7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const contasCarregadas = {};

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                carregarContas();
            }
        });

        function sairDoSistema() {
            auth.signOut().then(() => {
                window.location.href = "login.html";
            }).catch(err => {
                alert("Erro ao sair: " + err.message);
            });
        }

        function carregarContas() {
            db.collection("contas").orderBy("vencimento", "desc").onSnapshot(snapshot => {
                const corpo = document.getElementById("tabelaContas");
                corpo.innerHTML = "";
                let total = 0;
                let qtd = 0;

                for (const key in contasCarregadas) delete contasCarregadas[key];

                if (snapshot.empty) {
                    corpo.innerHTML = `<tr><td colspan="6" class="empty">Nenhuma conta cadastrada.</td></tr>`;
                } else {
                    snapshot.forEach(doc => {
                        const conta = doc.data();
                        const id = doc.id;
                        contasCarregadas[id] = { id, ...conta };

                        const valor = parseFloat(conta.valor) || 0;
                        total += valor;
                        qtd++;

                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${conta.descricao || "-"}</td>
                            <td>${conta.categoria || "-"}</td>
                            <td>${formatarData(conta.vencimento)}</td>
                            <td>${formatarMoeda(valor)}</td>
                            <td>${conta.status || "Pendente"}</td>
                            <td class="acoes">
                                <button class="btn-editar" onclick="editarConta('${id}')">Editar</button>
                                <button class="btn-excluir" onclick="excluirConta('${id}')">Excluir</button>
                            </td>
                        `;
                        corpo.appendChild(tr);
                    });
                }

                document.getElementById("totalContas").textContent = formatarMoeda(total);
                document.getElementById("qtdContas").textContent = qtd;
            }, err => {
                console.error("Erro ao carregar contas:", err);
            });
        }

        function abrirModal() {
            document.getElementById("modalTitulo").textContent = "Nova Conta";
            document.getElementById("contaId").value = "";
            document.getElementById("descricao").value = "";
            document.getElementById("categoria").value = "Moradia";
            document.getElementById("vencimento").value = "";
            document.getElementById("valor").value = "";
            document.getElementById("status").value = "Pendente";
            document.getElementById("modalConta").style.display = "flex";
        }

        function editarConta(id) {
            const conta = contasCarregadas[id];
            if (!conta) return;

            document.getElementById("modalTitulo").textContent = "Editar Conta";
            document.getElementById("contaId").value = conta.id;
            document.getElementById("descricao").value = conta.descricao || "";
            document.getElementById("categoria").value = conta.categoria || "Moradia";
            document.getElementById("vencimento").value = conta.vencimento || "";
            document.getElementById("valor").value = conta.valor || "";
            document.getElementById("status").value = conta.status || "Pendente";
            document.getElementById("modalConta").style.display = "flex";
        }

        function fecharModal() {
            document.getElementById("modalConta").style.display = "none";
        }

        function salvarConta() {
            const id = document.getElementById("contaId").value;
            const descricao = document.getElementById("descricao").value.trim();
            const categoria = document.getElementById("categoria").value;
            const vencimento = document.getElementById("vencimento").value;
            const valor = parseFloat(document.getElementById("valor").value);
            const status = document.getElementById("status").value;

            if (!descricao || !vencimento || isNaN(valor)) {
                alert("Preencha todos os campos corretamente.");
                return;
            }

            const dados = {
                descricao,
                categoria,
                vencimento,
                valor,
                status,
                atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
            };

            let promessa;
            if (id) {
                promessa = db.collection("contas").doc(id).update(dados);
            } else {
                dados.criadoEm = firebase.firestore.FieldValue.serverTimestamp();
                promessa = db.collection("contas").add(dados);
            }

            promessa.then(() => {
                fecharModal();
            }).catch(err => {
                alert("Erro ao salvar conta: " + err.message);
            });
        }

        function excluirConta(id) {
            if (!confirm("Tem certeza que deseja excluir esta conta?")) return;
            db.collection("contas").doc(id).delete().catch(err => {
                alert("Erro ao excluir conta: " + err.message);
            });
        }

        function formatarMoeda(valor) {
            return "R$ " + valor.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatarData(data) {
            if (!data) return "-";
            const partes = data.split("-");
            if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
            return data;
        }

        window.onclick = function(event) {
            const modal = document.getElementById("modalConta");
            if (event.target === modal) fecharModal();
        };
    </script>
</body>
</html>
